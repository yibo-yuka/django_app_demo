name: Deploy Django to GCP VM

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    # 確保使用的是最新的 Runner (它才支援 Node 24)
    runs-on: ubuntu-latest 
    environment: Production 
    
    env:
      # 1. 這是目前的正確做法：提前測試並採用 Node 24
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Code
        # v4 已經是目前最新，未來若有 v5 釋出支援 Node 24 即可升級
        uses: actions/checkout@v4

      - name: Google Auth
        # v2 目前運作正常，只需確保後續關注官方是否更新為 v3
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      # ...其餘步驟保持不變 ...